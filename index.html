<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帶好了嗎？</title>
<style>
  /* ===== 色彩與字體 ===== */
  :root {
    --sky: #BDE3FF;        /* 背景：天空藍 */
    --card: #FFFFFF;       /* 卡片白 */
    --ink: #324B6E;        /* 主文字：深藍 */
    --coral: #FF7B54;      /* 主按鈕：珊瑚橘 */
    --coral-dark: #E5633D;
    --leaf: #4CC36B;       /* 完成綠 */
    --star: #FFD449;       /* 星星黃 */
    --soft: #EAF6FF;       /* 淡藍底 */
    --pink: #FF9AB5;       /* 刪除粉 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "微軟正黑體", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--sky);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .screen {
    background: var(--card);
    border-radius: 28px;
    box-shadow: 0 8px 0 rgba(50,75,110,0.15);
    width: 100%;
    max-width: 420px;
    padding: 32px 24px;
    text-align: center;
    display: none;
  }
  .screen.active { display: block; animation: pop .35s ease; }
  @keyframes pop {
    0%   { transform: scale(.92); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  h1 { font-size: 28px; margin-bottom: 6px; }
  .sub { color: #7A8DA8; font-size: 15px; margin-bottom: 24px; }

  /* ===== 首頁兩大按鈕 ===== */
  .mode-btn {
    width: 100%;
    border: none;
    border-radius: 22px;
    padding: 22px;
    font-size: 22px;
    font-weight: bold;
    font-family: inherit;
    color: #fff;
    cursor: pointer;
    margin-bottom: 14px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    transition: transform .1s;
  }
  .mode-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  #goBtn   { background: var(--coral); }
  #homeBtn { background: #5BA8E5; }
  .resume {
    display: block;
    font-size: 13px;
    font-weight: normal;
    margin-top: 6px;
    opacity: .95;
  }

  /* 整理清單入口 */
  .edit-entry {
    width: 100%;
    background: #fff;
    border: 3px solid var(--star);
    color: var(--ink);
    border-radius: 18px;
    padding: 14px;
    font-size: 17px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    margin-top: 6px;
  }
  .edit-entry:active { transform: translateY(2px); }

  /* ===== 核對畫面 ===== */
  .mode-tag {
    display: inline-block;
    background: var(--soft);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .progress { font-size: 16px; margin-bottom: 18px; letter-spacing: 4px; min-height: 20px; }

  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--soft);
    border: 3px solid transparent;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
    transition: background .15s, border-color .15s;
  }
  .item .emoji { font-size: 30px; }
  .item .name  { font-size: 19px; font-weight: bold; flex: 1; text-align: left; }
  .item .box {
    width: 32px; height: 32px;
    border-radius: 10px;
    border: 3px solid #B9CCE0;
    background: #fff;
    font-size: 20px;
    line-height: 26px;
    color: #fff;
  }
  .item.checked { background: #E6F7EC; border-color: var(--leaf); }
  .item.checked .box { background: var(--leaf); border-color: var(--leaf); }
  .item.checked .emoji { animation: bounce .4s ease; }
  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.4) rotate(-8deg); }
    100% { transform: scale(1); }
  }

  .empty-hint {
    background: var(--soft);
    border-radius: 18px;
    padding: 28px 16px;
    color: #7A8DA8;
    font-size: 16px;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .back {
    background: none;
    border: none;
    color: #7A8DA8;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 10px;
    text-decoration: underline;
  }

  /* ===== 整理清單畫面 ===== */
  .edit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--soft);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .edit-item .e-emoji { font-size: 28px; }
  .edit-item .e-name { font-size: 18px; font-weight: bold; flex: 1; text-align: left; }
  .del-btn {
    border: none;
    background: var(--pink);
    color: #fff;
    width: 38px; height: 38px;
    border-radius: 12px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .del-btn:active { transform: translateY(2px); }

  .add-row {
    display: flex;
    gap: 10px;
    margin: 16px 0 8px;
  }
  .name-input {
    flex: 1;
    border: 3px solid #CDE3F5;
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 18px;
    font-family: inherit;
    color: var(--ink);
    min-width: 0;
  }
  .name-input:focus { outline: none; border-color: #5BA8E5; }
  .add-confirm {
    background: var(--leaf);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 0 22px;
    font-size: 18px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
  .add-confirm:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }

  /* ===== 完成畫面 ===== */
  .big-emoji { font-size: 64px; animation: party .6s ease; }
  @keyframes party {
    0%   { transform: scale(0) rotate(-30deg); }
    70%  { transform: scale(1.2) rotate(8deg); }
    100% { transform: scale(1) rotate(0); }
  }
  #doneTitle { margin-top: 10px; }
  #doneTime { color: #7A8DA8; font-size: 14px; margin: 10px 0 24px; }
  .stars { font-size: 26px; letter-spacing: 6px; margin-bottom: 8px; }
  #homeReturnBtn {
    background: var(--star);
    color: var(--ink);
    border: none;
    border-radius: 22px;
    padding: 16px 36px;
    font-size: 19px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
  }
  #homeReturnBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
</style>
</head>
<body>

<!-- 畫面一：首頁 -->
<div class="screen active" id="screenHome">
  <h1>🐻 帶好了嗎？</h1>
  <p class="sub">出門前、回家前，勾勾看東西都在嗎！</p>
  <button class="mode-btn" id="goBtn">
    🎒 我要出門了！
    <span class="resume" id="goResume"></span>
  </button>
  <button class="mode-btn" id="homeBtn">
    🏠 我要回家啦！
    <span class="resume" id="homeResume"></span>
  </button>
  <button class="edit-entry" id="editEntryBtn">✏️ 整理我的東西</button>
</div>

<!-- 畫面二：核對清單 -->
<div class="screen" id="screenCheck">
  <span class="mode-tag" id="modeTag"></span>
  <p class="progress" id="progress"></p>
  <div id="itemList"></div>
  <button class="back" id="backBtn">← 先回首頁（進度會記住喔）</button>
</div>

<!-- 畫面三：整理清單 -->
<div class="screen" id="screenEdit">
  <h1>✏️ 整理我的東西</h1>
  <p class="sub">固定要帶的留著就好，這次多帶的隨時加，不用了再刪！</p>
  <div id="editList"></div>
  <div class="add-row">
    <input class="name-input" id="newItemName" placeholder="例如：水壺" maxlength="10">
    <button class="add-confirm" id="addItemBtn">加進去</button>
  </div>
  <button class="back" id="editBackBtn">← 整理好了，回首頁</button>
</div>

<!-- 畫面四：完成 -->
<div class="screen" id="screenDone">
  <div class="big-emoji" id="doneEmoji">🎉</div>
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <h1 id="doneTitle"></h1>
  <p id="doneTime"></p>
  <button id="homeReturnBtn">回首頁</button>
</div>

<script>
  // ── 可愛動物裝飾圖（與物品內容無關，只是讓畫面可愛）──
  const ANIMALS = ["🐻","🐰","🐱","🐶","🦊","🐧","🐸","🐥","🐼","🐨","🐯","🦁","🐮","🐷","🐵","🦉"];

  // ── 模式資訊 ──
  const MODE_INFO = {
    outbound: { tag: "🎒 出門檢查", doneTitle: "全部帶齊，出發囉！", doneEmoji: "🚀" },
    inbound:  { tag: "🏠 回家檢查", doneTitle: "全部帶上了，好棒！", doneEmoji: "🎉" },
  };

  // ── localStorage key ──
  const ITEMS_KEY = "checklist_items";              // 清單：一直留著，由使用者自己增刪
  const PROGRESS_KEY = { outbound: "checklist_outbound", inbound: "checklist_inbound" };

  let items = [];         // [{ name, animal }]
  let mode = null;        // "outbound" 或 "inbound"
  let checked = [];       // 與 items 等長的布林陣列

  const $ = (id) => document.getElementById(id);

  // ── 清單讀寫（這份永遠留著，只有使用者手動增刪才會變）──
  function loadItems() {
    try {
      const raw = localStorage.getItem(ITEMS_KEY);
      if (!raw) return [];
      const data = JSON.parse(raw);
      return Array.isArray(data) ? data : [];
    } catch (e) { return []; }
  }
  function saveItems() {
    localStorage.setItem(ITEMS_KEY, JSON.stringify(items));
  }

  // 為新物品輪流配一隻動物：挑目前清單裡用得最少的，平均分配
  function pickAnimal() {
    const count = {};
    ANIMALS.forEach(a => count[a] = 0);
    items.forEach(it => { if (count[it.animal] !== undefined) count[it.animal]++; });
    let best = ANIMALS[0], min = Infinity;
    ANIMALS.forEach(a => { if (count[a] < min) { min = count[a]; best = a; } });
    return best;
  }

  // ── 勾選進度讀寫（用「物品名稱」記，所以增刪物品不會弄亂已勾的）──
  function loadProgress(m) {
    try {
      const raw = localStorage.getItem(PROGRESS_KEY[m]);
      if (!raw) return null;
      const data = JSON.parse(raw);
      if (!data || typeof data.byName !== "object") return null;
      // 依目前清單組出勾選陣列：清單裡有、但進度沒記到的（新加的）當未勾
      return items.map(it => !!data.byName[it.name]);
    } catch (e) { return null; }
  }
  function saveProgress() {
    const byName = {};
    items.forEach((it, i) => { byName[it.name] = !!checked[i]; });
    localStorage.setItem(PROGRESS_KEY[mode], JSON.stringify({ byName }));
  }
  function clearProgress(m) {
    localStorage.removeItem(PROGRESS_KEY[m]);
  }

  // ── 畫面切換 ──
  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    $(id).classList.add("active");
  }

  // ── 首頁 ──
  function renderHome() {
    items = loadItems();
    const go = loadProgress("outbound");
    const back = loadProgress("inbound");
    const goN = (go && go.filter(Boolean).length) || 0;
    const backN = (back && back.filter(Boolean).length) || 0;
    $("goResume").textContent   = goN   > 0 ? `已經勾了 ${goN}／${items.length} 樣，繼續吧！` : "";
    $("homeResume").textContent = backN > 0 ? `已經勾了 ${backN}／${items.length} 樣，繼續吧！` : "";
    show("screenHome");
  }

  // ── 核對畫面 ──
  function startCheck(m) {
    items = loadItems();
    mode = m;
    checked = loadProgress(m) || items.map(() => false);
    renderCheck();
    show("screenCheck");
  }

  function renderCheck() {
    $("modeTag").textContent = MODE_INFO[mode].tag;
    const list = $("itemList");
    list.innerHTML = "";

    if (items.length === 0) {
      $("progress").textContent = "";
      const hint = document.createElement("div");
      hint.className = "empty-hint";
      hint.innerHTML = "還沒有東西可以檢查耶！<br>先回首頁，按「整理我的東西」加東西吧 🐰";
      list.appendChild(hint);
      return;
    }

    $("progress").textContent = checked.map(c => c ? "⭐" : "☆").join("");
    items.forEach((item, i) => {
      const div = document.createElement("div");
      div.className = "item" + (checked[i] ? " checked" : "");
      div.innerHTML = `
        <span class="emoji">${item.animal}</span>
        <span class="name">${escapeHtml(item.name)}</span>
        <span class="box">${checked[i] ? "✓" : ""}</span>`;
      div.onclick = () => toggleItem(i);
      list.appendChild(div);
    });
  }

  function toggleItem(i) {
    checked[i] = !checked[i];
    saveProgress();
    renderCheck();
    if (items.length > 0 && checked.every(Boolean)) {
      setTimeout(finish, 600);
    }
  }

  // ── 完成（只清掉這次的勾選，清單本身完全不動）──
  function finish() {
    const info = MODE_INFO[mode];
    clearProgress(mode);
    $("doneEmoji").textContent = info.doneEmoji;
    $("doneTitle").textContent = info.doneTitle;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    $("doneTime").textContent = `完成時間 ${hh}:${mm}`;
    show("screenDone");
  }

  // ── 整理清單 ──
  function openEdit() {
    items = loadItems();
    renderEdit();
    show("screenEdit");
  }

  function renderEdit() {
    const list = $("editList");
    list.innerHTML = "";
    if (items.length === 0) {
      const hint = document.createElement("div");
      hint.className = "empty-hint";
      hint.innerHTML = "清單是空的，下面打名字加東西吧！";
      list.appendChild(hint);
    } else {
      items.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "edit-item";
        div.innerHTML = `
          <span class="e-emoji">${item.animal}</span>
          <span class="e-name">${escapeHtml(item.name)}</span>`;
        const del = document.createElement("button");
        del.className = "del-btn";
        del.textContent = "✕";
        del.onclick = () => removeItem(i);
        div.appendChild(del);
        list.appendChild(div);
      });
    }
  }

  function addItem() {
    const input = $("newItemName");
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    // 同名的就不重複加，避免進度對應混淆
    if (items.some(it => it.name === name)) {
      input.select();
      return;
    }
    items.push({ name, animal: pickAnimal() });
    saveItems();        // 只動清單，不碰任何勾選進度
    input.value = "";
    renderEdit();
    input.focus();
  }

  function removeItem(i) {
    if (!confirm(`要把「${items[i].name}」刪掉嗎？`)) return;
    items.splice(i, 1);
    saveItems();        // 只動清單，不碰任何勾選進度
    renderEdit();
  }

  // ── 防止名稱裡的特殊字元破壞畫面 ──
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  // ── 事件綁定 ──
  $("goBtn").onclick = () => startCheck("outbound");
  $("homeBtn").onclick = () => startCheck("inbound");
  $("editEntryBtn").onclick = openEdit;
  $("backBtn").onclick = renderHome;
  $("editBackBtn").onclick = renderHome;
  $("addItemBtn").onclick = addItem;
  $("homeReturnBtn").onclick = renderHome;
  $("newItemName").addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });

  // 開場
  renderHome();
</script>

</body>
</html>

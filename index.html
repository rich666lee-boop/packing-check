<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帶好了嗎？</title>
<style>
  :root {
    --sky: #BDE3FF; --card: #FFFFFF; --ink: #324B6E; --coral: #FF7B54;
    --leaf: #4CC36B; --star: #FFD449; --soft: #EAF6FF; --pink: #FF9AB5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "微軟正黑體", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--sky); color: var(--ink); min-height: 100vh;
    display: flex; justify-content: center; align-items: center; padding: 16px;
  }
  .screen {
    background: var(--card); border-radius: 28px;
    box-shadow: 0 8px 0 rgba(50,75,110,0.15);
    width: 100%; max-width: 420px; padding: 32px 24px;
    text-align: center; display: none; position: relative;
  }
  .screen.active { display: block; animation: pop .35s ease; }
  @keyframes pop { 0%{transform:scale(.92);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  @media (prefers-reduced-motion: reduce) { *{animation:none!important;transition:none!important;} }
  h1 { font-size: 26px; margin-bottom: 6px; }
  .sub { color: #7A8DA8; font-size: 15px; margin-bottom: 22px; }
  .intro-line { font-size: 21px; font-weight: bold; line-height: 1.5; margin: 24px 0 18px; min-height: 30px; }
  .field-label { text-align: left; font-size: 14px; color: #7A8DA8; margin: 10px 2px 4px; font-weight: bold; }
  .name-big {
    width: 100%; border: 3px solid #CDE3F5; border-radius: 16px; padding: 14px 16px;
    font-size: 20px; font-family: inherit; color: var(--ink); text-align: center; margin-bottom: 6px;
  }
  .name-big:focus { outline: none; border-color: #5BA8E5; }
  .err-msg { color: var(--coral); font-size: 14px; font-weight: bold; min-height: 20px; margin: 4px 0 8px; }
  .primary-btn {
    width: 100%; border: none; border-radius: 20px; padding: 16px; font-size: 19px;
    font-weight: bold; font-family: inherit; color: #fff; background: var(--leaf);
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.12); margin-top: 6px;
  }
  .primary-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  .list-card {
    display: flex; align-items: center; gap: 12px; width: 100%; background: var(--soft);
    border: 3px solid transparent; border-radius: 20px; padding: 16px; margin-bottom: 12px;
    cursor: pointer; user-select: none; transition: transform .1s, border-color .15s;
    text-align: left; font-family: inherit;
  }
  .list-card:active { transform: translateY(2px); }
  .list-card .l-emoji { font-size: 32px; }
  .list-card .l-info { flex: 1; min-width: 0; }
  .list-card .l-name { font-size: 20px; font-weight: bold; color: var(--ink); }
  .list-card .l-count { font-size: 13px; color: #7A8DA8; margin-top: 2px; }
  .list-card .l-go { font-size: 22px; color: #B9CCE0; }
  .add-list {
    width: 100%; border: 3px dashed #9DBEDB; background: #fff; border-radius: 20px;
    padding: 16px; font-size: 18px; font-weight: bold; font-family: inherit;
    color: #5BA8E5; cursor: pointer; margin-top: 4px;
  }
  .add-list:active { transform: translateY(2px); }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .topbar .who { font-size: 14px; color: #7A8DA8; }
  .logout-link {
    background: none; border: none; color: #5BA8E5; font-size: 13px;
    font-family: inherit; cursor: pointer; text-decoration: underline;
  }
  .greet-line { font-size: 16px; color: var(--ink); font-weight: bold; margin-bottom: 14px; min-height: 22px; }
  .mode-btn {
    width: 100%; border: none; border-radius: 22px; padding: 22px; font-size: 22px;
    font-weight: bold; font-family: inherit; color: #fff; cursor: pointer; margin-bottom: 14px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12); transition: transform .1s;
  }
  .mode-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  #goBtn { background: var(--coral); }
  #homeBtn { background: #5BA8E5; }
  .resume { display: block; font-size: 13px; font-weight: normal; margin-top: 6px; opacity: .95; }
  .edit-entry {
    width: 100%; background: #fff; border: 3px solid var(--star); color: var(--ink);
    border-radius: 18px; padding: 14px; font-size: 17px; font-weight: bold;
    font-family: inherit; cursor: pointer; margin-top: 6px;
  }
  .edit-entry:active { transform: translateY(2px); }
  .mode-tag {
    display: inline-block; background: var(--soft); border-radius: 999px;
    padding: 6px 16px; font-size: 15px; font-weight: bold; margin-bottom: 8px;
  }
  .progress { font-size: 16px; margin-bottom: 18px; letter-spacing: 4px; min-height: 20px; }
  .item {
    display: flex; align-items: center; gap: 14px; background: var(--soft);
    border: 3px solid transparent; border-radius: 18px; padding: 14px 16px;
    margin-bottom: 12px; cursor: pointer; user-select: none; transition: background .15s, border-color .15s;
  }
  .item .emoji { font-size: 30px; }
  .item .name { font-size: 19px; font-weight: bold; flex: 1; text-align: left; }
  .item .box {
    width: 32px; height: 32px; border-radius: 10px; border: 3px solid #B9CCE0;
    background: #fff; font-size: 20px; line-height: 26px; color: #fff;
  }
  .item.checked { background: #E6F7EC; border-color: var(--leaf); }
  .item.checked .box { background: var(--leaf); border-color: var(--leaf); }
  .item.checked .emoji { animation: bounce .4s ease; }
  @keyframes bounce { 0%{transform:scale(1);} 40%{transform:scale(1.4) rotate(-8deg);} 100%{transform:scale(1);} }
  .empty-hint {
    background: var(--soft); border-radius: 18px; padding: 28px 16px;
    color: #7A8DA8; font-size: 16px; margin-bottom: 12px; line-height: 1.6;
  }
  .back {
    background: none; border: none; color: #7A8DA8; font-size: 14px;
    font-family: inherit; cursor: pointer; margin-top: 10px; text-decoration: underline;
  }
  .edit-item {
    display: flex; align-items: center; gap: 12px; background: var(--soft);
    border-radius: 16px; padding: 12px 14px; margin-bottom: 10px;
  }
  .edit-item .e-emoji { font-size: 28px; }
  .edit-item .e-name { font-size: 18px; font-weight: bold; flex: 1; text-align: left; }
  .del-btn {
    border: none; background: var(--pink); color: #fff; width: 38px; height: 38px;
    border-radius: 12px; font-size: 20px; cursor: pointer; flex-shrink: 0; font-family: inherit;
  }
  .del-btn:active { transform: translateY(2px); }
  .add-row { display: flex; gap: 10px; margin: 16px 0 8px; }
  .name-input {
    flex: 1; border: 3px solid #CDE3F5; border-radius: 14px; padding: 12px 14px;
    font-size: 18px; font-family: inherit; color: var(--ink); min-width: 0;
  }
  .name-input:focus { outline: none; border-color: #5BA8E5; }
  .add-confirm {
    background: var(--leaf); color: #fff; border: none; border-radius: 14px;
    padding: 0 22px; font-size: 18px; font-weight: bold; font-family: inherit;
    cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.12); flex-shrink: 0;
  }
  .add-confirm:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
  .delete-list-link {
    background: none; border: none; color: var(--pink); font-size: 14px;
    font-family: inherit; cursor: pointer; margin-top: 4px; text-decoration: underline;
    display: block; width: 100%;
  }
  .big-emoji { font-size: 64px; animation: party .6s ease; }
  @keyframes party { 0%{transform:scale(0) rotate(-30deg);} 70%{transform:scale(1.2) rotate(8deg);} 100%{transform:scale(1) rotate(0);} }
  #doneTitle { margin-top: 10px; }
  #doneTime { color: #7A8DA8; font-size: 14px; margin: 10px 0 24px; }
  .stars { font-size: 26px; letter-spacing: 6px; margin-bottom: 8px; }
  #homeReturnBtn {
    background: var(--star); color: var(--ink); border: none; border-radius: 22px;
    padding: 16px 36px; font-size: 19px; font-weight: bold; font-family: inherit;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.12);
  }
  #homeReturnBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  #handHint {
    position: fixed; font-size: 40px; z-index: 9999; pointer-events: none;
    display: none; transition: top .3s ease, left .3s ease;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    animation: handWiggle 1s ease-in-out infinite;
  }
  @keyframes handWiggle { 0%,100%{transform:translateX(0);} 50%{transform:translateX(-12px);} }
</style>
</head>
<body>

<!-- 登入 -->
<div class="screen active" id="screenLogin">
  <h1>🐻 帶好了嗎？</h1>
  <p class="intro-line" id="loginLine">哈囉～歡迎來這裡！先打你的名字，再打密碼喔！</p>
  <div class="field-label">你叫什麼名字呀？</div>
  <input class="name-big" id="loginName" maxlength="8" placeholder="在這裡打名字">
  <div class="field-label">輸入密碼（123）</div>
  <input class="name-big" id="loginPw" maxlength="6" inputmode="numeric" placeholder="1 2 3">
  <div class="err-msg" id="loginErr"></div>
  <button class="primary-btn" id="loginBtn">進去</button>
</div>

<!-- 首頁 -->
<div class="screen" id="screenHome">
  <div class="topbar">
    <span class="who" id="whoLabel"></span>
    <button class="logout-link" id="logoutBtn">換人</button>
  </div>
  <h1>🐻 帶好了嗎？</h1>
  <p class="greet-line" id="greetLine"></p>
  <div id="listCards"></div>
  <button class="add-list" id="addListBtn">➕ 做一份新清單</button>
</div>

<!-- 新增清單 -->
<div class="screen" id="screenNewList">
  <h1>做一份新清單</h1>
  <p class="sub">這份清單要叫什麼名字呢？</p>
  <input class="name-big" id="newListName" maxlength="12" placeholder="例如：禮拜一、上學">
  <button class="primary-btn" id="newListOk">好了</button>
  <button class="back" id="newListCancel">← 先不要</button>
</div>

<!-- 清單選單 -->
<div class="screen" id="screenList">
  <h1 id="listTitle"></h1>
  <p class="sub">出門前、回家前，勾勾看東西都在嗎！</p>
  <button class="mode-btn" id="goBtn">🎒 我要出門了！<span class="resume" id="goResume"></span></button>
  <button class="mode-btn" id="homeBtn">🏠 我要回家啦！<span class="resume" id="homeResume"></span></button>
  <button class="edit-entry" id="editEntryBtn">✏️ 整理這份清單</button>
  <button class="back" id="listBackBtn">← 回去選別份清單</button>
</div>

<!-- 核對 -->
<div class="screen" id="screenCheck">
  <span class="mode-tag" id="modeTag"></span>
  <p class="progress" id="progress"></p>
  <div id="itemList"></div>
  <button class="back" id="backBtn">← 先回去（進度會記住喔）</button>
</div>

<!-- 整理 -->
<div class="screen" id="screenEdit">
  <h1 id="editTitle">✏️ 整理清單</h1>
  <p class="sub">固定要帶的留著就好，這次多帶的隨時加，不用了再刪！</p>
  <div id="editList"></div>
  <div class="add-row">
    <input class="name-input" id="newItemName" placeholder="例如：水壺" maxlength="10">
    <button class="add-confirm" id="addItemBtn">加進去</button>
  </div>
  <button class="back" id="editBackBtn">← 整理好了，回去</button>
  <button class="delete-list-link" id="deleteListBtn">🗑️ 刪掉整份清單</button>
</div>

<!-- 完成 -->
<div class="screen" id="screenDone">
  <div class="big-emoji" id="doneEmoji">🎉</div>
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <h1 id="doneTitle"></h1>
  <p id="doneTime"></p>
  <button id="homeReturnBtn">回去</button>
</div>

<div id="handHint">👈</div>

<script>
  const ANIMALS = ["🐻","🐰","🐱","🐶","🦊","🐧","🐸","🐥","🐼","🐨","🐯","🦁","🐮","🐷","🐵","🦉"];
  const MODE_INFO = {
    outbound: { tag: "🎒 出門檢查", doneTitle: "全部帶齊，出發囉！", doneEmoji: "🚀" },
    inbound:  { tag: "🏠 回家檢查", doneTitle: "全部帶上了，好棒！", doneEmoji: "🎉" },
  };
  const WD = ["禮拜天","禮拜一","禮拜二","禮拜三","禮拜四","禮拜五","禮拜六"];
  const ALLDAYS = [["禮拜一","上學"],["禮拜二","上學"],["禮拜三","上學"],["禮拜四","上學"],["禮拜五","上學"],["禮拜六","假日活動"],["禮拜天","假日活動"]];
  const USERS_KEY = "checklist_users";
  const FIXED_PW = "123";

  let users = {};
  let currentUser = null;
  let currentListId = null;
  let mode = null;
  let checked = [];

  const $ = (id) => document.getElementById(id);

  function speak(text) {
    if (!('speechSynthesis' in window) || !text) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-TW"; u.rate = 1; u.pitch = 1;
    window.speechSynthesis.speak(u);
  }

  function showHand(el) {
    const hand = $("handHint");
    if (!el) { hand.style.display = "none"; return; }
    requestAnimationFrame(() => {
      const r = el.getBoundingClientRect();
      hand.style.display = "block";
      hand.style.top = (r.top + r.height / 2 - 20) + "px";
      hand.style.left = (r.right + 6) + "px";
    });
  }
  function hideHand() { $("handHint").style.display = "none"; }

  function loadUsers() {
    try { const raw = localStorage.getItem(USERS_KEY); if (!raw) return {};
      const u = JSON.parse(raw); return (u && typeof u === "object") ? u : {};
    } catch (e) { return {}; }
  }
  function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
  function me() { return users[currentUser]; }

  function uid() { return "L" + Date.now() + Math.random().toString(36).slice(2, 6); }
  function getList(id) { return me().lists.find(l => l.id === id); }
  function pickAnimal(list) {
    const count = {}; ANIMALS.forEach(a => count[a] = 0);
    list.items.forEach(it => { if (count[it.animal] !== undefined) count[it.animal]++; });
    let best = ANIMALS[0], min = Infinity;
    ANIMALS.forEach(a => { if (count[a] < min) { min = count[a]; best = a; } });
    return best;
  }
  function getChecked(list, m) {
    const byName = (list.progress && list.progress[m] && list.progress[m].byName) || {};
    return list.items.map(it => !!byName[it.name]);
  }
  function saveChecked(list, m, arr) {
    if (!list.progress) list.progress = { outbound: { byName: {} }, inbound: { byName: {} } };
    const byName = {}; list.items.forEach((it, i) => { byName[it.name] = !!arr[i]; });
    list.progress[m] = { byName }; saveUsers();
  }
  function clearChecked(list, m) {
    if (!list.progress) list.progress = { outbound: { byName: {} }, inbound: { byName: {} } };
    list.progress[m] = { byName: {} }; saveUsers();
  }
  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    $(id).classList.add("active");
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  // 動態提示：提示還沒建過的最前面那一天
  function nextHint() {
    const names = me().lists.map(l => l.name);
    for (const [day, act] of ALLDAYS) {
      if (!names.some(n => n.indexOf(day) >= 0)) return day + "、" + act;
    }
    return "禮拜一、上學";
  }
  // 首頁招呼：禮拜一特別講，其他天講星期幾
  function greetText() {
    const d = new Date().getDay();   // 0=日..6=六
    if (d === 1) return "又過了一週了，今天要做什麼呢？";
    return "今天是" + WD[d] + "，要帶什麼呢？我們來看看吧！";
  }

  /* ===== 登入 ===== */
  let loginSpoken = false;
  function startLogin() {
    currentUser = null; hideHand();
    show("screenLogin");
    $("loginName").value = ""; $("loginPw").value = ""; $("loginErr").textContent = "";
    loginSpoken = false;
    showHand($("loginName"));
  }
  function loginHello() {
    if (loginSpoken) return; loginSpoken = true;
    speak("哈囉～歡迎來這裡！先打你的名字，再打密碼喔！");
  }
  function doLogin() {
    const name = $("loginName").value.trim().slice(0, 8);
    const pw = $("loginPw").value.trim();
    if (!name) { $("loginErr").textContent = "先打你的名字喔！"; $("loginName").focus(); return; }
    if (pw !== FIXED_PW) { $("loginErr").textContent = "密碼是 123 喔！"; $("loginPw").focus(); return; }
    users = loadUsers();
    if (!users[name]) { users[name] = { password: FIXED_PW, lists: [] }; saveUsers(); }
    currentUser = name;
    hideHand();
    speak(name + "，我們開始吧！");
    renderHome();
  }

  /* ===== 首頁 ===== */
  function renderHome() {
    currentListId = null; hideHand();
    $("whoLabel").textContent = "👤 " + currentUser;
    const g = greetText();
    $("greetLine").textContent = g;
    const wrap = $("listCards"); wrap.innerHTML = "";
    const lists = me().lists;
    if (lists.length === 0) {
      const hint = document.createElement("div"); hint.className = "empty-hint";
      hint.innerHTML = "還沒有清單喔！<br>按下面做一份新的吧 🐰"; wrap.appendChild(hint);
    } else {
      lists.forEach(list => {
        const emoji = list.items.length > 0 ? list.items[0].animal : "📋";
        const card = document.createElement("button"); card.className = "list-card";
        card.innerHTML = `<span class="l-emoji">${emoji}</span>
          <span class="l-info"><span class="l-name">${escapeHtml(list.name)}</span>
          <span class="l-count">${list.items.length} 樣東西</span></span><span class="l-go">›</span>`;
        card.onclick = () => openList(list.id); wrap.appendChild(card);
      });
    }
    show("screenHome");
    speak(g);
    if (lists.length === 0) showHand($("addListBtn")); else hideHand();
  }
  function logout() { startLogin(); }

  /* ===== 新增清單（動態提示）===== */
  function openNewList() {
    hideHand(); $("newListName").value = "";
    $("newListName").placeholder = "例如：" + nextHint();
    show("screenNewList"); $("newListName").focus();
  }
  function confirmNewList() {
    const name = $("newListName").value.trim();
    if (!name) { $("newListName").focus(); return; }
    me().lists.push({ id: uid(), name: name.slice(0, 12), items: [],
      progress: { outbound: { byName: {} }, inbound: { byName: {} } } });
    saveUsers(); renderHome();
  }

  /* ===== 清單選單 ===== */
  function openList(id) {
    const list = getList(id);
    if (!list) { renderHome(); return; }
    currentListId = id; $("listTitle").textContent = list.name;
    const go = getChecked(list, "outbound").filter(Boolean).length;
    const back = getChecked(list, "inbound").filter(Boolean).length;
    const n = list.items.length;
    $("goResume").textContent   = go   > 0 ? `已經勾了 ${go}／${n} 樣，繼續吧！` : "";
    $("homeResume").textContent = back > 0 ? `已經勾了 ${back}／${n} 樣，繼續吧！` : "";
    show("screenList");
    if (n === 0) { speak("還沒有東西喔！先來整理清單，把要帶的東西加進去吧！"); showHand($("editEntryBtn")); }
    else { speak("要出門了嗎？來檢查東西帶了沒！"); hideHand(); }
  }

  /* ===== 核對 ===== */
  function startCheck(m) {
    const list = getList(currentListId);
    if (!list) { renderHome(); return; }
    mode = m; checked = getChecked(list, m); renderCheck(); show("screenCheck");
    if (list.items.length > 0) speak("一個一個檢查，帶了就點一下打勾！");
  }
  function renderCheck() {
    const list = getList(currentListId);
    $("modeTag").textContent = MODE_INFO[mode].tag;
    const wrap = $("itemList"); wrap.innerHTML = ""; hideHand();
    if (list.items.length === 0) {
      $("progress").textContent = "";
      const hint = document.createElement("div"); hint.className = "empty-hint";
      hint.innerHTML = "這份清單還沒有東西耶！<br>先回去按「整理這份清單」加東西吧 🐰";
      wrap.appendChild(hint); return;
    }
    $("progress").textContent = checked.map(c => c ? "⭐" : "☆").join("");
    let firstUnchecked = -1;
    list.items.forEach((item, i) => {
      const div = document.createElement("div");
      div.className = "item" + (checked[i] ? " checked" : "");
      div.innerHTML = `<span class="emoji">${item.animal}</span>
        <span class="name">${escapeHtml(item.name)}</span>
        <span class="box">${checked[i] ? "✓" : ""}</span>`;
      div.onclick = () => toggleItem(i); wrap.appendChild(div);
      if (!checked[i] && firstUnchecked === -1) firstUnchecked = i;
    });
    if (firstUnchecked >= 0) showHand(wrap.children[firstUnchecked]); else hideHand();
  }
  function toggleItem(i) {
    const list = getList(currentListId);
    checked[i] = !checked[i]; saveChecked(list, mode, checked); renderCheck();
    if (list.items.length > 0 && checked.every(Boolean)) setTimeout(finish, 600);
  }

  /* ===== 完成：結尾叫一次名字 ===== */
  function finish() {
    const list = getList(currentListId); const info = MODE_INFO[mode];
    clearChecked(list, mode); hideHand();
    $("doneEmoji").textContent = info.doneEmoji; $("doneTitle").textContent = info.doneTitle;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    $("doneTime").textContent = `完成時間 ${hh}:${mm}`;
    show("screenDone");
    speak(currentUser + "好棒～全部都帶好了！");
  }

  /* ===== 整理 ===== */
  function openEdit() {
    const list = getList(currentListId);
    if (!list) { renderHome(); return; }
    $("editTitle").textContent = "✏️ 整理「" + list.name + "」";
    renderEdit(); show("screenEdit");
    speak("想想看，要帶什麼呢？想到就加進來吧！");
    showHand($("addItemBtn"));
  }
  function renderEdit() {
    const list = getList(currentListId);
    const wrap = $("editList"); wrap.innerHTML = "";
    if (list.items.length === 0) {
      const hint = document.createElement("div"); hint.className = "empty-hint";
      hint.innerHTML = "清單是空的，下面打名字加東西吧！"; wrap.appendChild(hint);
    } else {
      list.items.forEach((item, i) => {
        const div = document.createElement("div"); div.className = "edit-item";
        div.innerHTML = `<span class="e-emoji">${item.animal}</span>
          <span class="e-name">${escapeHtml(item.name)}</span>`;
        const del = document.createElement("button"); del.className = "del-btn";
        del.textContent = "✕"; del.onclick = () => removeItem(i);
        div.appendChild(del); wrap.appendChild(div);
      });
    }
  }
  function addItem() {
    const list = getList(currentListId); const input = $("newItemName");
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    if (list.items.some(it => it.name === name)) { input.select(); return; }
    list.items.push({ name, animal: pickAnimal(list) });
    saveUsers(); input.value = ""; renderEdit(); input.focus();
    showHand($("addItemBtn"));
  }
  function removeItem(i) {
    const list = getList(currentListId);
    if (!confirm(`要把「${list.items[i].name}」刪掉嗎？`)) return;
    list.items.splice(i, 1); saveUsers(); renderEdit();
  }
  function deleteList() {
    const list = getList(currentListId);
    if (!confirm(`要刪掉整份「${list.name}」清單嗎？\n裡面的東西都會一起不見喔。`)) return;
    const idx = me().lists.findIndex(l => l.id === currentListId);
    if (idx >= 0) me().lists.splice(idx, 1); saveUsers(); renderHome();
  }

  /* ===== 事件綁定 ===== */
  $("loginName").addEventListener("focus", loginHello);
  $("loginName").addEventListener("click", loginHello);
  $("loginName").addEventListener("input", () => { if ($("loginName").value.trim()) showHand($("loginPw")); });
  $("loginPw").addEventListener("focus", () => showHand($("loginBtn")));
  $("loginBtn").onclick = doLogin;
  $("loginPw").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  $("loginName").addEventListener("keydown", (e) => { if (e.key === "Enter") $("loginPw").focus(); });
  $("logoutBtn").onclick = logout;
  $("addListBtn").onclick = openNewList;
  $("newListOk").onclick = confirmNewList;
  $("newListCancel").onclick = renderHome;
  $("newListName").addEventListener("keydown", (e) => { if (e.key === "Enter") confirmNewList(); });
  $("goBtn").onclick = () => startCheck("outbound");
  $("homeBtn").onclick = () => startCheck("inbound");
  $("editEntryBtn").onclick = openEdit;
  $("listBackBtn").onclick = renderHome;
  $("backBtn").onclick = () => openList(currentListId);
  $("editBackBtn").onclick = () => openList(currentListId);
  $("addItemBtn").onclick = addItem;
  $("deleteListBtn").onclick = deleteList;
  $("homeReturnBtn").onclick = () => openList(currentListId);
  $("newItemName").addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });

  /* ===== 啟動：一律從登入開始 ===== */
  users = loadUsers();
  startLogin();
</script>

</body>
</html>

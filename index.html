<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帶好了嗎？</title>
<style>
  :root {
    --sky: #BDE3FF;
    --card: #FFFFFF;
    --ink: #324B6E;
    --coral: #FF7B54;
    --leaf: #4CC36B;
    --star: #FFD449;
    --soft: #EAF6FF;
    --pink: #FF9AB5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "微軟正黑體", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--sky);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .screen {
    background: var(--card);
    border-radius: 28px;
    box-shadow: 0 8px 0 rgba(50,75,110,0.15);
    width: 100%;
    max-width: 420px;
    padding: 32px 24px;
    text-align: center;
    display: none;
  }
  .screen.active { display: block; animation: pop .35s ease; }
  @keyframes pop {
    0%   { transform: scale(.92); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  h1 { font-size: 26px; margin-bottom: 6px; }
  .sub { color: #7A8DA8; font-size: 15px; margin-bottom: 22px; }

  /* ===== 清單選擇（首頁）===== */
  .list-card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: var(--soft);
    border: 3px solid transparent;
    border-radius: 20px;
    padding: 16px 16px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
    transition: transform .1s, border-color .15s;
    text-align: left;
    font-family: inherit;
  }
  .list-card:active { transform: translateY(2px); }
  .list-card .l-emoji { font-size: 32px; }
  .list-card .l-info { flex: 1; min-width: 0; }
  .list-card .l-name { font-size: 20px; font-weight: bold; color: var(--ink); }
  .list-card .l-count { font-size: 13px; color: #7A8DA8; margin-top: 2px; }
  .list-card .l-go { font-size: 22px; color: #B9CCE0; }

  .add-list {
    width: 100%;
    border: 3px dashed #9DBEDB;
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    font-family: inherit;
    color: #5BA8E5;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-list:active { transform: translateY(2px); }

  /* ===== 清單選單（進入某份清單後）===== */
  .mode-btn {
    width: 100%;
    border: none;
    border-radius: 22px;
    padding: 22px;
    font-size: 22px;
    font-weight: bold;
    font-family: inherit;
    color: #fff;
    cursor: pointer;
    margin-bottom: 14px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    transition: transform .1s;
  }
  .mode-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  #goBtn   { background: var(--coral); }
  #homeBtn { background: #5BA8E5; }
  .resume {
    display: block;
    font-size: 13px;
    font-weight: normal;
    margin-top: 6px;
    opacity: .95;
  }
  .edit-entry {
    width: 100%;
    background: #fff;
    border: 3px solid var(--star);
    color: var(--ink);
    border-radius: 18px;
    padding: 14px;
    font-size: 17px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    margin-top: 6px;
  }
  .edit-entry:active { transform: translateY(2px); }

  /* ===== 核對畫面 ===== */
  .mode-tag {
    display: inline-block;
    background: var(--soft);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .progress { font-size: 16px; margin-bottom: 18px; letter-spacing: 4px; min-height: 20px; }

  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--soft);
    border: 3px solid transparent;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
    transition: background .15s, border-color .15s;
  }
  .item .emoji { font-size: 30px; }
  .item .name  { font-size: 19px; font-weight: bold; flex: 1; text-align: left; }
  .item .box {
    width: 32px; height: 32px;
    border-radius: 10px;
    border: 3px solid #B9CCE0;
    background: #fff;
    font-size: 20px;
    line-height: 26px;
    color: #fff;
  }
  .item.checked { background: #E6F7EC; border-color: var(--leaf); }
  .item.checked .box { background: var(--leaf); border-color: var(--leaf); }
  .item.checked .emoji { animation: bounce .4s ease; }
  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.4) rotate(-8deg); }
    100% { transform: scale(1); }
  }

  .empty-hint {
    background: var(--soft);
    border-radius: 18px;
    padding: 28px 16px;
    color: #7A8DA8;
    font-size: 16px;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .back {
    background: none;
    border: none;
    color: #7A8DA8;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 10px;
    text-decoration: underline;
  }

  /* ===== 整理清單畫面 ===== */
  .edit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--soft);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .edit-item .e-emoji { font-size: 28px; }
  .edit-item .e-name { font-size: 18px; font-weight: bold; flex: 1; text-align: left; }
  .del-btn {
    border: none;
    background: var(--pink);
    color: #fff;
    width: 38px; height: 38px;
    border-radius: 12px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .del-btn:active { transform: translateY(2px); }

  .add-row {
    display: flex;
    gap: 10px;
    margin: 16px 0 8px;
  }
  .name-input {
    flex: 1;
    border: 3px solid #CDE3F5;
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 18px;
    font-family: inherit;
    color: var(--ink);
    min-width: 0;
  }
  .name-input:focus { outline: none; border-color: #5BA8E5; }
  .add-confirm {
    background: var(--leaf);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 0 22px;
    font-size: 18px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
  .add-confirm:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }

  .delete-list-link {
    background: none;
    border: none;
    color: var(--pink);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 4px;
    text-decoration: underline;
    display: block;
    width: 100%;
  }

  /* ===== 完成畫面 ===== */
  .big-emoji { font-size: 64px; animation: party .6s ease; }
  @keyframes party {
    0%   { transform: scale(0) rotate(-30deg); }
    70%  { transform: scale(1.2) rotate(8deg); }
    100% { transform: scale(1) rotate(0); }
  }
  #doneTitle { margin-top: 10px; }
  #doneTime { color: #7A8DA8; font-size: 14px; margin: 10px 0 24px; }
  .stars { font-size: 26px; letter-spacing: 6px; margin-bottom: 8px; }
  #homeReturnBtn {
    background: var(--star);
    color: var(--ink);
    border: none;
    border-radius: 22px;
    padding: 16px 36px;
    font-size: 19px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
  }
  #homeReturnBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
</style>
</head>
<body>

<!-- 畫面一：選清單（首頁）-->
<div class="screen active" id="screenHome">
  <h1>🐻 帶好了嗎？</h1>
  <p class="sub">選一份清單，或做一份新的！</p>
  <div id="listCards"></div>
  <button class="add-list" id="addListBtn">➕ 做一份新清單</button>
</div>

<!-- 畫面二：清單選單（出門／回家／整理）-->
<div class="screen" id="screenList">
  <h1 id="listTitle"></h1>
  <p class="sub">出門前、回家前，勾勾看東西都在嗎！</p>
  <button class="mode-btn" id="goBtn">
    🎒 我要出門了！
    <span class="resume" id="goResume"></span>
  </button>
  <button class="mode-btn" id="homeBtn">
    🏠 我要回家啦！
    <span class="resume" id="homeResume"></span>
  </button>
  <button class="edit-entry" id="editEntryBtn">✏️ 整理這份清單</button>
  <button class="back" id="listBackBtn">← 回去選別份清單</button>
</div>

<!-- 畫面三：核對清單 -->
<div class="screen" id="screenCheck">
  <span class="mode-tag" id="modeTag"></span>
  <p class="progress" id="progress"></p>
  <div id="itemList"></div>
  <button class="back" id="backBtn">← 先回去（進度會記住喔）</button>
</div>

<!-- 畫面四：整理清單 -->
<div class="screen" id="screenEdit">
  <h1 id="editTitle">✏️ 整理清單</h1>
  <p class="sub">固定要帶的留著就好，這次多帶的隨時加，不用了再刪！</p>
  <div id="editList"></div>
  <div class="add-row">
    <input class="name-input" id="newItemName" placeholder="例如：水壺" maxlength="10">
    <button class="add-confirm" id="addItemBtn">加進去</button>
  </div>
  <button class="back" id="editBackBtn">← 整理好了，回去</button>
  <button class="delete-list-link" id="deleteListBtn">🗑️ 刪掉整份清單</button>
</div>

<!-- 畫面五：完成 -->
<div class="screen" id="screenDone">
  <div class="big-emoji" id="doneEmoji">🎉</div>
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <h1 id="doneTitle"></h1>
  <p id="doneTime"></p>
  <button id="homeReturnBtn">回去</button>
</div>

<script>
  // ── 可愛動物裝飾圖（與物品內容無關，只是讓畫面可愛）──
  const ANIMALS = ["🐻","🐰","🐱","🐶","🦊","🐧","🐸","🐥","🐼","🐨","🐯","🦁","🐮","🐷","🐵","🦉"];

  const MODE_INFO = {
    outbound: { tag: "🎒 出門檢查", doneTitle: "全部帶齊，出發囉！", doneEmoji: "🚀" },
    inbound:  { tag: "🏠 回家檢查", doneTitle: "全部帶上了，好棒！", doneEmoji: "🎉" },
  };

  // ── localStorage：一筆，裡面裝所有清單 ──
  // data = { lists: [ { id, name, items:[{name,animal}], progress:{outbound:{byName},inbound:{byName}} } ] }
  const DATA_KEY = "checklist_data";

  let data = { lists: [] };
  let currentListId = null;   // 目前選中的清單
  let mode = null;            // "outbound" / "inbound"
  let checked = [];           // 與目前清單 items 等長

  const $ = (id) => document.getElementById(id);

  // ── 資料讀寫 ──
  function loadData() {
    try {
      const raw = localStorage.getItem(DATA_KEY);
      if (!raw) return { lists: [] };
      const d = JSON.parse(raw);
      return (d && Array.isArray(d.lists)) ? d : { lists: [] };
    } catch (e) { return { lists: [] }; }
  }
  function saveData() { localStorage.setItem(DATA_KEY, JSON.stringify(data)); }
  function uid() { return "L" + Date.now() + Math.random().toString(36).slice(2, 6); }
  function getList(id) { return data.lists.find(l => l.id === id); }

  function pickAnimal(list) {
    const count = {};
    ANIMALS.forEach(a => count[a] = 0);
    list.items.forEach(it => { if (count[it.animal] !== undefined) count[it.animal]++; });
    let best = ANIMALS[0], min = Infinity;
    ANIMALS.forEach(a => { if (count[a] < min) { min = count[a]; best = a; } });
    return best;
  }

  // 進度依物品名稱記，增刪物品不會弄亂已勾的
  function getChecked(list, m) {
    const byName = (list.progress && list.progress[m] && list.progress[m].byName) || {};
    return list.items.map(it => !!byName[it.name]);
  }
  function saveChecked(list, m, arr) {
    if (!list.progress) list.progress = { outbound: { byName: {} }, inbound: { byName: {} } };
    const byName = {};
    list.items.forEach((it, i) => { byName[it.name] = !!arr[i]; });
    list.progress[m] = { byName };
    saveData();
  }
  function clearChecked(list, m) {
    if (!list.progress) list.progress = { outbound: { byName: {} }, inbound: { byName: {} } };
    list.progress[m] = { byName: {} };
    saveData();
  }

  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    $(id).classList.add("active");
  }

  // ── 首頁：列出所有清單 ──
  function renderHome() {
    data = loadData();
    currentListId = null;
    const wrap = $("listCards");
    wrap.innerHTML = "";

    if (data.lists.length === 0) {
      const hint = document.createElement("div");
      hint.className = "empty-hint";
      hint.innerHTML = "還沒有清單喔！<br>按下面做一份新的吧 🐰";
      wrap.appendChild(hint);
    } else {
      data.lists.forEach(list => {
        const emoji = list.items.length > 0 ? list.items[0].animal : "📋";
        const card = document.createElement("button");
        card.className = "list-card";
        card.innerHTML = `
          <span class="l-emoji">${emoji}</span>
          <span class="l-info">
            <span class="l-name">${escapeHtml(list.name)}</span>
            <span class="l-count">${list.items.length} 樣東西</span>
          </span>
          <span class="l-go">›</span>`;
        card.onclick = () => openList(list.id);
        wrap.appendChild(card);
      });
    }
    show("screenHome");
  }

  function addList() {
    const name = (prompt("這份清單要叫什麼名字？\n（例如：禮拜一、去打球）") || "").trim();
    if (!name) return;
    data.lists.push({
      id: uid(),
      name: name.slice(0, 12),
      items: [],
      progress: { outbound: { byName: {} }, inbound: { byName: {} } }
    });
    saveData();
    renderHome();
  }

  // ── 清單選單 ──
  function openList(id) {
    data = loadData();
    const list = getList(id);
    if (!list) { renderHome(); return; }
    currentListId = id;
    $("listTitle").textContent = list.name;
    const go = getChecked(list, "outbound").filter(Boolean).length;
    const back = getChecked(list, "inbound").filter(Boolean).length;
    const n = list.items.length;
    $("goResume").textContent   = go   > 0 ? `已經勾了 ${go}／${n} 樣，繼續吧！` : "";
    $("homeResume").textContent = back > 0 ? `已經勾了 ${back}／${n} 樣，繼續吧！` : "";
    show("screenList");
  }

  // ── 核對畫面 ──
  function startCheck(m) {
    data = loadData();
    const list = getList(currentListId);
    if (!list) { renderHome(); return; }
    mode = m;
    checked = getChecked(list, m);
    renderCheck();
    show("screenCheck");
  }

  function renderCheck() {
    const list = getList(currentListId);
    $("modeTag").textContent = MODE_INFO[mode].tag;
    const wrap = $("itemList");
    wrap.innerHTML = "";

    if (list.items.length === 0) {
      $("progress").textContent = "";
      const hint = document.createElement("div");
      hint.className = "empty-hint";
      hint.innerHTML = "這份清單還沒有東西耶！<br>先回去按「整理這份清單」加東西吧 🐰";
      wrap.appendChild(hint);
      return;
    }

    $("progress").textContent = checked.map(c => c ? "⭐" : "☆").join("");
    list.items.forEach((item, i) => {
      const div = document.createElement("div");
      div.className = "item" + (checked[i] ? " checked" : "");
      div.innerHTML = `
        <span class="emoji">${item.animal}</span>
        <span class="name">${escapeHtml(item.name)}</span>
        <span class="box">${checked[i] ? "✓" : ""}</span>`;
      div.onclick = () => toggleItem(i);
      wrap.appendChild(div);
    });
  }

  function toggleItem(i) {
    const list = getList(currentListId);
    checked[i] = !checked[i];
    saveChecked(list, mode, checked);
    renderCheck();
    if (list.items.length > 0 && checked.every(Boolean)) {
      setTimeout(finish, 600);
    }
  }

  // ── 完成：只清這份清單這個模式的勾選，物品與別份都不動 ──
  function finish() {
    const list = getList(currentListId);
    const info = MODE_INFO[mode];
    clearChecked(list, mode);
    $("doneEmoji").textContent = info.doneEmoji;
    $("doneTitle").textContent = info.doneTitle;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    $("doneTime").textContent = `完成時間 ${hh}:${mm}`;
    show("screenDone");
  }

  // ── 整理清單 ──
  function openEdit() {
    data = loadData();
    const list = getList(currentListId);
    if (!list) { renderHome(); return; }
    $("editTitle").textContent = "✏️ 整理「" + list.name + "」";
    renderEdit();
    show("screenEdit");
  }

  function renderEdit() {
    const list = getList(currentListId);
    const wrap = $("editList");
    wrap.innerHTML = "";
    if (list.items.length === 0) {
      const hint = document.createElement("div");
      hint.className = "empty-hint";
      hint.innerHTML = "清單是空的，下面打名字加東西吧！";
      wrap.appendChild(hint);
    } else {
      list.items.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "edit-item";
        div.innerHTML = `
          <span class="e-emoji">${item.animal}</span>
          <span class="e-name">${escapeHtml(item.name)}</span>`;
        const del = document.createElement("button");
        del.className = "del-btn";
        del.textContent = "✕";
        del.onclick = () => removeItem(i);
        div.appendChild(del);
        wrap.appendChild(div);
      });
    }
  }

  function addItem() {
    const list = getList(currentListId);
    const input = $("newItemName");
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    if (list.items.some(it => it.name === name)) { input.select(); return; }
    list.items.push({ name, animal: pickAnimal(list) });
    saveData();
    input.value = "";
    renderEdit();
    input.focus();
  }

  function removeItem(i) {
    const list = getList(currentListId);
    if (!confirm(`要把「${list.items[i].name}」刪掉嗎？`)) return;
    list.items.splice(i, 1);
    saveData();
    renderEdit();
  }

  function deleteList() {
    const list = getList(currentListId);
    if (!confirm(`要刪掉整份「${list.name}」清單嗎？\n裡面的東西都會一起不見喔。`)) return;
    const idx = data.lists.findIndex(l => l.id === currentListId);
    if (idx >= 0) data.lists.splice(idx, 1);
    saveData();
    renderHome();
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  // ── 事件綁定 ──
  $("addListBtn").onclick = addList;
  $("goBtn").onclick = () => startCheck("outbound");
  $("homeBtn").onclick = () => startCheck("inbound");
  $("editEntryBtn").onclick = openEdit;
  $("listBackBtn").onclick = renderHome;
  $("backBtn").onclick = () => openList(currentListId);
  $("editBackBtn").onclick = () => openList(currentListId);
  $("addItemBtn").onclick = addItem;
  $("deleteListBtn").onclick = deleteList;
  $("homeReturnBtn").onclick = () => openList(currentListId);
  $("newItemName").addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });

  // 開場
  renderHome();
</script>

</body>
</html>

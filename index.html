<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帶好了嗎？</title>
<style>
  :root {
    --sky: #BDE3FF;
    --card: #FFFFFF;
    --ink: #324B6E;
    --coral: #FF7B54;
    --leaf: #4CC36B;
    --star: #FFD449;
    --soft: #EAF6FF;
    --pink: #FF9AB5;
    --blue: #5BA8E5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "微軟正黑體", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--sky);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .screen {
    background: var(--card);
    border-radius: 28px;
    box-shadow: 0 8px 0 rgba(50,75,110,0.15);
    width: 100%;
    max-width: 420px;
    padding: 28px 24px;
    text-align: center;
    display: none;
  }
  .screen.active { display: block; animation: pop .35s ease; }
  @keyframes pop {
    0%   { transform: scale(.92); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  h1 { font-size: 26px; margin-bottom: 6px; }
  .sub { color: #7A8DA8; font-size: 15px; margin-bottom: 22px; }

  .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
  .dots .dot { width: 10px; height: 10px; border-radius: 50%; background: #D7E7F5; transition: background .2s; }
  .dots .dot.on { background: var(--blue); }

  .char-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }
  .char-img { height: 150px; width: auto; object-fit: contain; }
  .char-img.small { height: 90px; }
  .bubble {
    position: relative;
    background: var(--soft);
    border-radius: 18px;
    padding: 14px 18px;
    font-size: 18px;
    font-weight: bold;
    color: var(--ink);
    margin: 10px auto 0;
    max-width: 320px;
    line-height: 1.5;
  }
  .bubble::after {
    content: "";
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-bottom-color: var(--soft);
  }

  .lang-wrap { position: relative; width: 100%; max-width: 300px; margin: 30px auto 0; }
  .lang-btn {
    width: 100%; height: 64px; border-radius: 18px;
    border: 3px solid var(--blue); background: #fff; color: var(--ink);
    font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 14px;
    cursor: pointer; font-family: inherit;
  }
  .lang-globe { font-size: 30px; }
  .lang-finger { position: absolute; right: -4px; top: 52px; font-size: 34px; pointer-events: none; }
  .lang-menu { display: none; margin-top: 12px; background: #fff; border-radius: 18px; border: 3px solid #CDE3F5; overflow: hidden; }
  .lang-menu button {
    width: 100%; height: 54px; border: none; border-bottom: 1px solid var(--soft);
    background: #fff; color: var(--ink); font-size: 20px; cursor: pointer; font-family: inherit;
  }
  .lang-menu button:active { background: var(--soft); }

  .pick-row { display: flex; gap: 14px; justify-content: center; margin-bottom: 18px; }
  .pick-card {
    flex: 1; background: var(--soft); border: 4px solid transparent; border-radius: 22px;
    padding: 14px 8px 10px; cursor: pointer; transition: transform .12s, border-color .15s, opacity .15s;
    font-family: inherit;
  }
  .pick-card img { height: 140px; width: auto; object-fit: contain; }
  .pick-card .pick-name { font-size: 20px; font-weight: bold; margin-top: 6px; }
  .pick-card.sel { border-color: var(--leaf); transform: translateY(-4px); }
  .pick-card.dim { opacity: .45; }

  .big-btn {
    width: 100%; border: none; border-radius: 22px; padding: 18px;
    font-size: 21px; font-weight: bold; font-family: inherit; color: #fff;
    cursor: pointer; margin-top: 6px; box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    transition: transform .1s;
  }
  .big-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  .big-btn.coral { background: var(--coral); }
  .big-btn.blue { background: var(--blue); }
  .big-btn.leaf { background: var(--leaf); }
  .big-btn.disabled { background: #C3D3E2; cursor: default; box-shadow: 0 5px 0 rgba(0,0,0,0.06); }

  .gender-row { display: flex; gap: 14px; margin-bottom: 8px; }
  .gender-btn {
    flex: 1; background: var(--soft); border: 4px solid transparent; border-radius: 22px;
    padding: 22px 8px; font-size: 22px; font-weight: bold; font-family: inherit; color: var(--ink);
    cursor: pointer; transition: transform .12s, border-color .15s;
  }
  .gender-btn .g-emoji { font-size: 40px; display: block; margin-bottom: 6px; }
  .gender-btn:active { transform: translateY(2px); }
  .gender-btn.sel { border-color: var(--blue); }

  .name-input, .loc-input {
    width: 100%; border: 3px solid #CDE3F5; border-radius: 16px;
    padding: 14px 16px; font-size: 20px; font-family: inherit; color: var(--ink);
    text-align: center; margin-bottom: 12px;
  }
  .name-input:focus, .loc-input:focus { outline: none; border-color: var(--blue); }

  .loc-list { text-align: left; margin-bottom: 10px; }
  .loc-item {
    background: var(--soft); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
    cursor: pointer; font-size: 17px;
  }
  .loc-item:active { background: #DCEEFB; }
  .loc-item .lc-city { font-weight: bold; }
  .loc-item .lc-region { font-size: 13px; color: #7A8DA8; margin-top: 2px; }
  .loc-status { color: #7A8DA8; font-size: 15px; margin-bottom: 10px; min-height: 22px; }

  .weather-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--soft); border-radius: 18px; padding: 12px 16px; margin-bottom: 16px;
  }
  .weather-bar .wb-date { font-size: 14px; color: #7A8DA8; text-align: left; }
  .weather-bar .wb-main { display: flex; align-items: center; gap: 8px; }
  .weather-bar .wb-icon { font-size: 30px; }
  .weather-bar .wb-temp { font-size: 22px; font-weight: bold; }
  .weather-bar .wb-rain { font-size: 13px; color: var(--blue); }
  .settings-btn {
    background: none; border: none; font-size: 24px; cursor: pointer; color: #7A8DA8;
    position: absolute; top: 18px; right: 20px;
  }

  .list-card {
    display: flex; align-items: center; gap: 12px; width: 100%;
    background: var(--soft); border: 3px solid transparent; border-radius: 20px;
    padding: 16px; margin-bottom: 12px; cursor: pointer; user-select: none;
    transition: transform .1s, border-color .15s; text-align: left; font-family: inherit;
  }
  .list-card:active { transform: translateY(2px); }
  .list-card .l-emoji { font-size: 32px; }
  .list-card .l-info { flex: 1; min-width: 0; }
  .list-card .l-name { font-size: 20px; font-weight: bold; color: var(--ink); }
  .list-card .l-count { font-size: 13px; color: #7A8DA8; margin-top: 2px; }
  .list-card .l-go { font-size: 22px; color: #B9CCE0; }
  .add-list {
    width: 100%; border: 3px dashed #9DBEDB; background: #fff; border-radius: 20px;
    padding: 16px; font-size: 18px; font-weight: bold; font-family: inherit;
    color: var(--blue); cursor: pointer; margin-top: 4px;
  }
  .add-list:active { transform: translateY(2px); }

  .mode-btn {
    width: 100%; border: none; border-radius: 22px; padding: 22px; font-size: 22px;
    font-weight: bold; font-family: inherit; color: #fff; cursor: pointer; margin-bottom: 14px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12); transition: transform .1s;
  }
  .mode-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  #goBtn   { background: var(--coral); }
  #homeBtn { background: var(--blue); }
  .resume { display: block; font-size: 13px; font-weight: normal; margin-top: 6px; opacity: .95; }
  .edit-entry {
    width: 100%; background: #fff; border: 3px solid var(--star); color: var(--ink);
    border-radius: 18px; padding: 14px; font-size: 17px; font-weight: bold; font-family: inherit;
    cursor: pointer; margin-top: 6px;
  }
  .edit-entry:active { transform: translateY(2px); }

  .mode-tag {
    display: inline-block; background: var(--soft); border-radius: 999px; padding: 6px 16px;
    font-size: 15px; font-weight: bold; margin-bottom: 8px;
  }
  .progress { font-size: 16px; margin-bottom: 18px; letter-spacing: 4px; min-height: 20px; }
  .item {
    display: flex; align-items: center; gap: 14px; background: var(--soft);
    border: 3px solid transparent; border-radius: 18px; padding: 14px 16px; margin-bottom: 12px;
    cursor: pointer; user-select: none; transition: background .15s, border-color .15s;
  }
  .item .emoji { font-size: 30px; }
  .item .name  { font-size: 19px; font-weight: bold; flex: 1; text-align: left; }
  .item .box {
    width: 32px; height: 32px; border-radius: 10px; border: 3px solid #B9CCE0;
    background: #fff; font-size: 20px; line-height: 26px; color: #fff;
  }
  .item.checked { background: #E6F7EC; border-color: var(--leaf); }
  .item.checked .box { background: var(--leaf); border-color: var(--leaf); }
  .item.checked .emoji { animation: bounce .4s ease; }
  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.4) rotate(-8deg); }
    100% { transform: scale(1); }
  }
  .empty-hint {
    background: var(--soft); border-radius: 18px; padding: 28px 16px; color: #7A8DA8;
    font-size: 16px; margin-bottom: 12px; line-height: 1.6;
  }
  .back {
    background: none; border: none; color: #7A8DA8; font-size: 14px; font-family: inherit;
    cursor: pointer; margin-top: 10px; text-decoration: underline;
  }
  .edit-item {
    display: flex; align-items: center; gap: 12px; background: var(--soft);
    border-radius: 16px; padding: 12px 14px; margin-bottom: 10px;
  }
  .edit-item .e-emoji { font-size: 28px; }
  .edit-item .e-name { font-size: 18px; font-weight: bold; flex: 1; text-align: left; }
  .del-btn {
    border: none; background: var(--pink); color: #fff; width: 38px; height: 38px;
    border-radius: 12px; font-size: 20px; cursor: pointer; flex-shrink: 0; font-family: inherit;
  }
  .del-btn:active { transform: translateY(2px); }
  .add-row { display: flex; gap: 10px; margin: 16px 0 8px; }
  .name-input2 {
    flex: 1; border: 3px solid #CDE3F5; border-radius: 14px; padding: 12px 14px;
    font-size: 18px; font-family: inherit; color: var(--ink); min-width: 0;
  }
  .name-input2:focus { outline: none; border-color: var(--blue); }
  .add-confirm {
    background: var(--leaf); color: #fff; border: none; border-radius: 14px; padding: 0 22px;
    font-size: 18px; font-weight: bold; font-family: inherit; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12); flex-shrink: 0;
  }
  .add-confirm:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
  .delete-list-link {
    background: none; border: none; color: var(--pink); font-size: 14px; font-family: inherit;
    cursor: pointer; margin-top: 4px; text-decoration: underline; display: block; width: 100%;
  }
  .big-emoji { font-size: 64px; animation: party .6s ease; }
  @keyframes party {
    0%   { transform: scale(0) rotate(-30deg); }
    70%  { transform: scale(1.2) rotate(8deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .done-char { height: 130px; width: auto; margin-bottom: 6px; }
  #doneTitle { margin-top: 6px; }
  #doneTime { color: #7A8DA8; font-size: 14px; margin: 10px 0 24px; }
  .stars { font-size: 26px; letter-spacing: 6px; margin-bottom: 8px; }
  #homeReturnBtn {
    background: var(--star); color: var(--ink); border: none; border-radius: 22px;
    padding: 16px 36px; font-size: 19px; font-weight: bold; font-family: inherit;
    cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.12);
  }
  #homeReturnBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  .settings-section { text-align: left; margin-bottom: 18px; }
  .settings-section h3 { font-size: 16px; margin-bottom: 8px; color: var(--ink); }
  .set-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- ============ 設定流程 ============ -->

<!-- S1 語言頁 -->
<div class="screen" id="scLang">
  <div class="dots" data-step="0"></div>
  <h1>🐯🐰</h1>
  <div class="lang-wrap">
    <button class="lang-btn" id="langBtn" aria-label="select language">
      <span class="lang-globe">🌐</span><span id="langArrow">▾</span>
    </button>
    <div class="lang-finger" id="langFinger">👆</div>
    <div class="lang-menu" id="langMenu"></div>
  </div>
</div>

<!-- S2 角色頁 -->
<div class="screen" id="scChar">
  <div class="dots" data-step="1"></div>
  <h1 id="charTitle"></h1>
  <div class="pick-row">
    <button class="pick-card" id="pickAwei">
      <img src="awei_smile.png" alt="阿威">
      <div class="pick-name">阿威</div>
    </button>
    <button class="pick-card" id="pickXiaoqing">
      <img src="xiaoqing_smile.png" alt="小晴">
      <div class="pick-name">小晴</div>
    </button>
  </div>
  <button class="big-btn leaf disabled" id="charConfirm" disabled></button>
</div>

<!-- S3 名字頁 -->
<div class="screen" id="scName">
  <div class="dots" data-step="2"></div>
  <div class="char-wrap">
    <img class="char-img" id="nameChar" src="" alt="">
    <div class="bubble" id="nameBubble"></div>
  </div>
  <input class="name-input" id="nameInput" maxlength="12" placeholder="">
  <button class="big-btn leaf" id="nameNext"></button>
</div>

<!-- S4 性別頁 -->
<div class="screen" id="scGender">
  <div class="dots" data-step="3"></div>
  <div class="char-wrap">
    <img class="char-img" id="genderChar" src="" alt="">
    <div class="bubble" id="genderBubble"></div>
  </div>
  <div class="gender-row">
    <button class="gender-btn" id="gBoy"><span class="g-emoji">👦</span><span id="gBoyLabel"></span></button>
    <button class="gender-btn" id="gGirl"><span class="g-emoji">👧</span><span id="gGirlLabel"></span></button>
  </div>
  <button class="big-btn leaf disabled" id="genderNext" disabled></button>
</div>

<!-- S5 所在地頁 -->
<div class="screen" id="scLoc">
  <div class="dots" data-step="4"></div>
  <div class="char-wrap">
    <img class="char-img" id="locChar" src="" alt="">
    <div class="bubble" id="locBubble"></div>
  </div>
  <input class="loc-input" id="locInput" placeholder="">
  <div class="loc-status" id="locStatus"></div>
  <div class="loc-list" id="locList"></div>
</div>

<!-- ============ 主程式畫面 ============ -->

<!-- 選清單（首頁）-->
<div class="screen" id="screenHome">
  <button class="settings-btn" id="openSettings">⚙️</button>
  <div class="weather-bar" id="weatherBar" style="display:none;">
    <div class="wb-date" id="wbDate"></div>
    <div class="wb-main">
      <span class="wb-icon" id="wbIcon"></span>
      <div>
        <div class="wb-temp" id="wbTemp"></div>
        <div class="wb-rain" id="wbRain"></div>
      </div>
    </div>
  </div>
  <h1 id="homeTitle">🐻 帶好了嗎？</h1>
  <p class="sub" id="homeSub"></p>
  <div id="listCards"></div>
  <button class="add-list" id="addListBtn"></button>
</div>

<!-- 清單選單 -->
<div class="screen" id="screenList">
  <h1 id="listTitle"></h1>
  <p class="sub" id="listSub"></p>
  <button class="mode-btn" id="goBtn"><span id="goLabel"></span><span class="resume" id="goResume"></span></button>
  <button class="mode-btn" id="homeBtn"><span id="homeLabel"></span><span class="resume" id="homeResume"></span></button>
  <button class="edit-entry" id="editEntryBtn"></button>
  <button class="back" id="listBackBtn"></button>
</div>

<!-- 核對清單 -->
<div class="screen" id="screenCheck">
  <span class="mode-tag" id="modeTag"></span>
  <p class="progress" id="progress"></p>
  <div id="itemList"></div>
  <button class="back" id="backBtn"></button>
</div>

<!-- 整理清單 -->
<div class="screen" id="screenEdit">
  <h1 id="editTitle"></h1>
  <p class="sub" id="editSub"></p>
  <div id="editList"></div>
  <div class="add-row">
    <input class="name-input2" id="newItemName" maxlength="10" placeholder="">
    <button class="add-confirm" id="addItemBtn"></button>
  </div>
  <button class="back" id="editBackBtn"></button>
  <button class="delete-list-link" id="deleteListBtn"></button>
</div>

<!-- 完成 -->
<div class="screen" id="screenDone">
  <img class="done-char" id="doneChar" src="" alt="">
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <h1 id="doneTitle"></h1>
  <p id="doneTime"></p>
  <button id="homeReturnBtn"></button>
</div>

<!-- 設定頁 -->
<div class="screen" id="screenSettings">
  <h1 id="setTitle"></h1>
  <div class="settings-section">
    <h3 id="setLangTitle"></h3>
    <div class="set-row"><select class="loc-input" id="setLangSelect" style="margin:0;"></select></div>
    <h3 id="setCharTitle"></h3>
    <div class="set-row">
      <button class="gender-btn" id="setAwei" style="padding:10px;"><img src="awei_smile.png" style="height:60px;"><div>阿威</div></button>
      <button class="gender-btn" id="setXiaoqing" style="padding:10px;"><img src="xiaoqing_smile.png" style="height:60px;"><div>小晴</div></button>
    </div>
    <h3 id="setNameTitle"></h3>
    <input class="loc-input" id="setNameInput" maxlength="12" style="text-align:left;">
    <h3 id="setGenderTitle"></h3>
    <div class="gender-row">
      <button class="gender-btn" id="setBoy" style="padding:12px;"><span class="g-emoji">👦</span><span id="setBoyLabel"></span></button>
      <button class="gender-btn" id="setGirl" style="padding:12px;"><span class="g-emoji">👧</span><span id="setGirlLabel"></span></button>
    </div>
    <h3 id="setLocTitle"></h3>
    <input class="loc-input" id="setLocInput" style="text-align:left;">
    <div class="loc-status" id="setLocStatus"></div>
    <div class="loc-list" id="setLocList"></div>
  </div>
  <button class="big-btn leaf" id="setSave"></button>
  <button class="back" id="setBack"></button>
</div>

<script>
  var $ = function(id){ return document.getElementById(id); };

  var CHAR_IMG = {
    awei:     { smile:"awei_smile.png",     think:"awei_think.png",     happy:"awei_happy.png" },
    xiaoqing: { smile:"xiaoqing_smile.png", think:"xiaoqing_think.png", happy:"xiaoqing_happy.png" }
  };

  var LANGS = [
    { code:"zh", label:"繁體中文" },
    { code:"en", label:"English" }
  ];

  var UI = {
    zh: {
      charTitle:"選一個夥伴，陪你一起準備！",
      charConfirm:"就決定是你了！",
      namePh:"打上你的名字",
      nameNext:"好了",
      gBoy:"男生", gGirl:"女生", genderNext:"下一步",
      locPh:"打城市的名字，例如：台北",
      locSearching:"我看看喔…",
      locNotFound:"找不到這個地方，換個字看看？",
      homeSub:"選一份清單，或做一份新的！",
      addList:"➕ 做一份新清單",
      listSub:"出門前、回家前，勾勾看東西都在嗎！",
      goLabel:"🎒 我要出門了！", homeLabel:"🏠 我要回家啦！",
      editEntry:"✏️ 整理這份清單", listBack:"← 回去選別份清單",
      back:"← 先回去（進度會記住喔）",
      editTitlePre:"✏️ 整理「", editTitleSuf:"」",
      editSub:"固定要帶的留著就好，這次多帶的隨時加，不用了再刪！",
      newItemPh:"例如：水壺", addItem:"加進去",
      editBack:"← 整理好了，回去", deleteList:"🗑️ 刪掉整份清單",
      homeReturn:"回去",
      emptyHome:"還沒有清單喔！<br>按下面做一份新的吧 🐰",
      emptyCheck:"這份清單還沒有東西耶！<br>先回去按「整理這份清單」加東西吧 🐰",
      emptyEdit:"清單是空的，下面打名字加東西吧！",
      resume:function(n,t){ return "已經勾了 "+n+"／"+t+" 樣，繼續吧！"; },
      count:function(n){ return n+" 樣東西"; },
      promptListName:"這份清單要叫什麼名字？\n（例如：禮拜一、去打球）",
      confirmDelItem:function(n){ return "要把「"+n+"」刪掉嗎？"; },
      confirmDelList:function(n){ return "要刪掉整份「"+n+"」清單嗎？\n裡面的東西都會一起不見喔。"; },
      tagOut:"🎒 出門檢查", tagIn:"🏠 回家檢查",
      doneOut:"全部帶齊，出發囉！", doneIn:"全部帶上了，好棒！",
      doneTime:function(h,m){ return "完成時間 "+h+":"+m; },

  var voicesReady = false;
  function loadVoices(){ try { window.speechSynthesis.getVoices(); voicesReady = true; } catch(e){} }
  if (window.speechSynthesis){
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  function pickVoice(lc){
    if (!window.speechSynthesis) return null;
    var vs = window.speechSynthesis.getVoices() || [];
    var want = lc === "zh" ? ["zh-TW","zh-HK","zh-CN","zh"] : ["en-US","en-GB","en"];
    for (var i=0;i<want.length;i++){
      for (var j=0;j<vs.length;j++){
        if (vs[j].lang && vs[j].lang.toLowerCase().indexOf(want[i].toLowerCase())===0) return vs[j];
      }
    }
    return null;
  }
  function speakKey(key, opts){
    if (!window.speechSynthesis) return;
    var node = VOICE[key]; if(!node) return;
    var byChar = node[chr()]; if(!byChar) return;
    var text = byChar[lang()] || byChar.zh; if(!text) return;
    opts = opts || {};
    if (profile && profile.name) text = text.replace(/○○/g, profile.name);
    if (opts.item) text = text.replace(/\{物品\}/g, opts.item);
    try {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      var v = pickVoice(lang());
      if (v) u.voice = v;
      u.lang = lang()==="zh" ? "zh-TW" : "en-US";
      u.rate = 0.95;
      window.speechSynthesis.speak(u);
    } catch(e){}
  }
  function voiceText(key){
    var node = VOICE[key]; if(!node) return "";
    var byChar = node[chr()]; if(!byChar) return "";
    var text = byChar[lang()] || byChar.zh;
    if (profile && profile.name) text = text.replace(/○○/g, profile.name);
    return text;
  }

  function loadData(){
    try {
      var raw = localStorage.getItem(DATA_KEY);
      if (!raw) return { lists: [] };
      var d = JSON.parse(raw);
      return (d && d.lists && d.lists.length !== undefined) ? d : { lists: [] };
    } catch(e){ return { lists: [] }; }
  }
  function saveData(){ localStorage.setItem(DATA_KEY, JSON.stringify(data)); }
  function loadProfile(){
    try { var raw = localStorage.getItem(PROFILE_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  }
  function saveProfile(){ localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); }
  function uid(){ return "L"+Date.now()+Math.random().toString(36).slice(2,6); }
  function getList(id){ for(var i=0;i<data.lists.length;i++){ if(data.lists[i].id===id) return data.lists[i]; } return null; }
  function escapeHtml(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }
  function pickAnimal(list){
    var count={}; ANIMALS.forEach(function(a){count[a]=0;});
    list.items.forEach(function(it){ if(count[it.animal]!==undefined) count[it.animal]++; });
    var best=ANIMALS[0], min=Infinity;
    ANIMALS.forEach(function(a){ if(count[a]<min){min=count[a];best=a;} });
    return best;
  }
  function getChecked(list,m){
    var byName=(list.progress&&list.progress[m]&&list.progress[m].byName)||{};
    return list.items.map(function(it){ return !!byName[it.name]; });
  }
  function saveChecked(list,m,arr){
    if(!list.progress) list.progress={outbound:{byName:{}},inbound:{byName:{}}};
    var byName={}; list.items.forEach(function(it,i){ byName[it.name]=!!arr[i]; });
    list.progress[m]={byName:byName}; saveData();
  }
  function clearChecked(list,m){
    if(!list.progress) list.progress={outbound:{byName:{}},inbound:{byName:{}}};
    list.progress[m]={byName:{}}; saveData();
  }

  function show(id){

  function renderDots(){

    for(var k=0;k<ds.length;k++){
      var step=parseInt(ds[k].getAttribute("data-step"),10);
      ds[k].innerHTML="";
      for(var i=0;i<5;i++){
        var d=document.createElement("span");
        d.className="dot"+(i<=step?" on":"");
        ds[k].appendChild(d);
      }
    }
  }

  var geoTimer=null, geoSeq=0;
  function geocode(query, statusEl, listEl, charImgEl, onPick){
    clearTimeout(geoTimer);
    var q=query.trim();
    listEl.innerHTML="";
    if(q.length<1){ statusEl.textContent=""; return; }
    geoTimer=setTimeout(function(){
      var myseq=++geoSeq;
      statusEl.textContent = tt("locSearching");
      if(charImgEl) charImgEl.src = CHAR_IMG[draft.char].think;
      var url="https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=6&language="+(draft.lang==="zh"?"zh":"en");
      fetch(url).then(function(r){ return r.json(); }).then(function(res){
        if(myseq!==geoSeq) return;
        if(charImgEl) charImgEl.src = CHAR_IMG[draft.char].smile;
        statusEl.textContent="";
        if(!res.results || res.results.length===0){ statusEl.textContent=tt("locNotFound"); return; }
        listEl.innerHTML="";
        res.results.forEach(function(item){
          var div=document.createElement("div");
          div.className="loc-item";
          var region=[item.admin1, item.country].filter(Boolean).join(", ");
          div.innerHTML='<div class="lc-city">'+escapeHtml(item.name)+'</div><div class="lc-region">'+escapeHtml(region)+'</div>';
          div.onclick=function(){ onPick(item); };
          listEl.appendChild(div);
        });
      }).catch(function(){
        if(myseq!==geoSeq) return;
        if(charImgEl) charImgEl.src = CHAR_IMG[draft.char].smile;
        statusEl.textContent=tt("locNotFound");
      });
    },300);
  }
  $("locInput").addEventListener("input",function(){

  function weatherCategory(code, tempMax){
    if (code >= 51) return "rainy";
    if (typeof tempMax === "number" && tempMax < 16) return "cold";
    return "sunny";
  }
  function weatherIcon(cat){ return cat==="rainy"?"🌧️":(cat==="cold"?"🧥":"☀️"); }

  function fetchWeather(){
    var bar=$("weatherBar");
    if(!profile || profile.lat==null){ bar.style.display="none"; return; }
    var now=new Date();
    var l=L();
    var w=l.weekdays[now.getDay()];
    $("wbDate").textContent = l.dateFmt(now.getFullYear(), now.getMonth()+1, now.getDate(), w);
    var url="https://api.open-meteo.com/v1/forecast?latitude="+profile.lat+"&longitude="+profile.lon
          +"&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=1";
    fetch(url).then(function(r){ return r.json(); }).then(function(res){
      if(!res.daily){ bar.style.display="none"; return; }
      var code=res.daily.weather_code[0];
      var tmax=res.daily.temperature_2m_max[0];
      var tmin=res.daily.temperature_2m_min[0];
      var rain=res.daily.precipitation_probability_max[0];
      var cat=weatherCategory(code, tmax);
      $("wbIcon").textContent=weatherIcon(cat);
      $("wbTemp").textContent=Math.round(tmin)+"°~"+Math.round(tmax)+"°";
      $("wbRain").textContent=L().rainLabel(rain==null?0:rain);
      bar.style.display="flex";
      speakKey(cat==="rainy"?"weather_rainy":(cat==="cold"?"weather_cold":"weather_sunny"));
    }).catch(function(){ bar.style.display="none"; });
  }

    MODE_INFO.inbound ={ tag:L().tagIn,  doneTitle:L().doneIn,  doneImg:CHAR_IMG[chr()].happy };

    var wrap=$("listCards"); wrap.innerHTML="";

      data.lists.forEach(function(list){

        var card=document.createElement("button");
        card.className="list-card";
        card.innerHTML='<span class="l-emoji">'+emoji+'</span>'
          +'<span class="l-info"><span class="l-name">'+escapeHtml(list.name)+'</span>'
          +'<span class="l-count">'+L().count(list.items.length)+'</span></span>'
          +'<span class="l-go">›</span>';
        card.onclick=function(){ openList(list.id); };
        wrap.appendChild(card);
      });

  function addList(){
    var name=(prompt(L().promptListName)||"").trim();
    if(!name) return;
    data.lists.push({ id:uid(), name:name.slice(0,12), items:[],
      progress:{outbound:{byName:{}},inbound:{byName:{}}} });
    saveData(); renderHome();

  function openList(id){
    data=loadData();
    var list=getList(id);
    if(!list){ renderHome(); return; }
    currentListId=id;
    $("listTitle").textContent=list.name;
    $("listSub").textContent=L().listSub;
    $("goLabel").textContent=L().goLabel;
    $("homeLabel").textContent=L().homeLabel;
    $("editEntryBtn").textContent=L().editEntry;
    $("listBackBtn").textContent=L().listBack;
    var go=getChecked(list,"outbound").filter(Boolean).length;
    var back=getChecked(list,"inbound").filter(Boolean).length;
    var n=list.items.length;
    $("goResume").textContent   = go>0   ? L().resume(go,n)   : "";
    $("homeResume").textContent = back>0 ? L().resume(back,n) : "";
    show("screenList");

  function startCheck(m){
    data=loadData();
    var list=getList(currentListId);
    if(!list){ renderHome(); return; }
    mode=m; checked=getChecked(list,m);
    renderCheck();
    show("screenCheck");
    speakKey("checklist_enter");
  }
  function renderCheck(){
    var list=getList(currentListId);
    $("modeTag").textContent=MODE_INFO[mode].tag;
    $("backBtn").textContent=L().back;
    var wrap=$("itemList"); wrap.innerHTML="";
    if(list.items.length===0){
      $("progress").textContent="";
      var hint=document.createElement("div");
      hint.className="empty-hint"; hint.innerHTML=L().emptyCheck;
      wrap.appendChild(hint); return;
    }
    $("progress").textContent=checked.map(function(c){return c?"⭐":"☆";}).join("");
    list.items.forEach(function(item,i){
      var div=document.createElement("div");
      div.className="item"+(checked[i]?" checked":"");
      div.innerHTML='<span class="emoji">'+item.animal+'</span>'
        +'<span class="name">'+escapeHtml(item.name)+'</span>'
        +'<span class="box">'+(checked[i]?"✓":"")+'</span>';
      div.onclick=function(){ toggleItem(i); };
      wrap.appendChild(div);
    });
  }
  function toggleItem(i){
    var list=getList(currentListId);
    checked[i]=!checked[i];
    saveChecked(list,mode,checked);
    if(checked[i]) speakKey("item_checked",{ item:list.items[i].name });
    renderCheck();
    if(list.items.length>0 && checked.every(Boolean)){ setTimeout(finish,700); }
  }
  function finish(){
    var list=getList(currentListId);
    var info=MODE_INFO[mode];
    clearChecked(list,mode);
    $("doneChar").src=info.doneImg;
    $("doneTitle").textContent=info.doneTitle;
    var now=new Date();
    var hh=String(now.getHours()).padStart(2,"0");
    var mm=String(now.getMinutes()).padStart(2,"0");
    $("doneTime").textContent=L().doneTime(hh,mm);
    $("homeReturnBtn").textContent=L().homeReturn;
    show("screenDone");
    speakKey("all_checked");
  }

  function openEdit(){
    data=loadData();
    var list=getList(currentListId);
    if(!list){ renderHome(); return; }
    $("editTitle").textContent=L().editTitlePre+list.name+L().editTitleSuf;
    $("editSub").textContent=L().editSub;
    $("newItemName").placeholder=L().newItemPh;
    $("addItemBtn").textContent=L().addItem;
    $("editBackBtn").textContent=L().editBack;
    $("deleteListBtn").textContent=L().deleteList;
    renderEdit();
    show("screenEdit");
  }
  function renderEdit(){
    var list=getList(currentListId);
    var wrap=$("editList"); wrap.innerHTML="";
    if(list.items.length===0){
      var hint=document.createElement("div");
      hint.className="empty-hint"; hint.innerHTML=L().emptyEdit;
      wrap.appendChild(hint);
    } else {
      list.items.forEach(function(item,i){
        var div=document.createElement("div");
        div.className="edit-item";
        div.innerHTML='<span class="e-emoji">'+item.animal+'</span>'
          +'<span class="e-name">'+escapeHtml(item.name)+'</span>';
        var del=document.createElement("button");
        del.className="del-btn"; del.textContent="✕";
        del.onclick=function(){ removeItem(i); };
        div.appendChild(del);
        wrap.appendChild(div);
      });
    }
  }
  function addItem(){
    var list=getList(currentListId);
    var input=$("newItemName");
    var name=input.value.trim();
    if(!name){ input.focus(); return; }
    for(var k=0;k<list.items.length;k++){ if(list.items[k].name===name){ input.select(); return; } }
    list.items.push({ name:name, animal:pickAnimal(list) });
    saveData(); input.value=""; renderEdit(); input.focus();
  }
  function removeItem(i){
    var list=getList(currentListId);
    if(!confirm(L().confirmDelItem(list.items[i].name))) return;
    list.items.splice(i,1); saveData(); renderEdit();
  }
  function deleteList(){
    var list=getList(currentListId);
    if(!confirm(L().confirmDelList(list.name))) return;
    var idx=-1; for(var i=0;i<data.lists.length;i++){ if(data.lists[i].id===currentListId){ idx=i; break; } }
    if(idx>=0) data.lists.splice(idx,1);
    saveData(); renderHome();
  }

  var setDraft = {};
  var setGeoSel = null;
  function openSettings(){
    setDraft = { lang:profile.lang, char:profile.char, name:profile.name,
                 gender:profile.gender, city:profile.city, lat:profile.lat, lon:profile.lon };
    setGeoSel = null;
    var l=L();
    $("setTitle").textContent=l.setTitle;
    $("setLangTitle").textContent=l.setLang;
    $("setCharTitle").textContent=l.setChar;
    $("setNameTitle").textContent=l.setName;
    $("setGenderTitle").textContent=l.setGender;
    $("setLocTitle").textContent=l.setLoc;
    $("setSave").textContent=l.setSave;
    $("setBack").textContent=l.setBack;
    $("setBoyLabel").textContent=l.gBoy;
    $("setGirlLabel").textContent=l.gGirl;
    var sel=$("setLangSelect"); sel.innerHTML="";
    LANGS.forEach(function(x){
      var o=document.createElement("option");
      o.value=x.code; o.textContent=x.label;
      if(x.code===setDraft.lang) o.selected=true;
      sel.appendChild(o);
    });
    $("setNameInput").value=setDraft.name;
    $("setLocInput").value=setDraft.city||"";
    $("setLocStatus").textContent=""; $("setLocList").innerHTML="";
    reflectSetChar(); reflectSetGender();
    show("screenSettings");
  }
  function reflectSetChar(){
    $("setAwei").classList.toggle("sel", setDraft.char==="awei");
    $("setXiaoqing").classList.toggle("sel", setDraft.char==="xiaoqing");
  }
  function reflectSetGender(){
    $("setBoy").classList.toggle("sel", setDraft.gender==="boy");
    $("setGirl").classList.toggle("sel", setDraft.gender==="girl");
  }
  $("setAwei").onclick=function(){ setDraft.char="awei"; reflectSetChar(); };
  $("setXiaoqing").onclick=function(){ setDraft.char="xiaoqing"; reflectSetChar(); };
  $("setBoy").onclick=function(){ setDraft.gender="boy"; reflectSetGender(); };
  $("setGirl").onclick=function(){ setDraft.gender="girl"; reflectSetGender(); };
  $("setLangSelect").onchange=function(){ setDraft.lang=this.value; };
  $("setLocInput").addEventListener("input",function(){
    var savedLang=draft.lang; draft.lang=setDraft.lang;
    var savedChar=draft.char; draft.char=setDraft.char;
    geocode(this.value, $("setLocStatus"), $("setLocList"), null, function(item){
      setDraft.city=item.name; setDraft.lat=item.latitude; setDraft.lon=item.longitude;
      setGeoSel=item;
      $("setLocInput").value=item.name;
      $("setLocList").innerHTML="";
      $("setLocStatus").textContent="✓ "+item.name;
    });
    draft.lang=savedLang; draft.char=savedChar;
  });
  $("setSave").onclick=function(){
    profile.lang=setDraft.lang;
    profile.char=setDraft.char;
    var nm=$("setNameInput").value.trim();
    if(nm) profile.name=nm.slice(0,12);
    profile.gender=setDraft.gender;
    if(setGeoSel){ profile.city=setDraft.city; profile.lat=setDraft.lat; profile.lon=setDraft.lon; }
    saveProfile();
    enterHome();
  };
  $("setBack").onclick=function(){ enterHome(); };
  $("openSettings").onclick=openSettings;

  $("addListBtn").onclick=addList;
  $("goBtn").onclick=function(){ startCheck("outbound"); };
  $("homeBtn").onclick=function(){ startCheck("inbound"); };
  $("editEntryBtn").onclick=openEdit;
  $("listBackBtn").onclick=renderHome;
  $("backBtn").onclick=function(){ openList(currentListId); };
  $("editBackBtn").onclick=function(){ openList(currentListId); };
  $("addItemBtn").onclick=addItem;
  $("deleteListBtn").onclick=deleteList;
  $("homeReturnBtn").onclick=function(){ openList(currentListId); };
  $("newItemName").addEventListener("keydown",function(e){ if(e.key==="Enter") addItem(); });

  profile=loadProfile();
  if(profile && profile.char && profile.name){
    enterHome();
  } else {
    startOnboarding();
  }
</script>
</body>
</html>
